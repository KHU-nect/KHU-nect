spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/khunect}
    username: ${DB_USERNAME:khunect}
    password: ${DB_PASSWORD:khunect}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: info
