spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/khunect}
    username: ${DB_USERNAME:khunect}
    password: ${DB_PASSWORD:khunect}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
            scope:
              - profile
              - email

logging:
  level:
    org.hibernate.SQL: info
