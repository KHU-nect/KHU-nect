spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/techblog_db}
    username: ${DB_USERNAME:techuser}
    password: ${DB_PASSWORD:techpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
