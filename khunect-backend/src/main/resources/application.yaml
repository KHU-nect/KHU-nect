server:
  port: 8080

spring:
  application:
    name: khunect-backend
  profiles:
    active: local
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  level:
    com.khunect.backend: debug

app:
  auth:
    allowed-email-domain: khu.ac.kr
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173