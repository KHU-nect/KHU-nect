services:
  db:
    image: postgres:16
    container_name: local-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-techuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-techpassword}
      POSTGRES_DB: ${DB_NAME:-techblog_db}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-techuser} -d ${DB_NAME:-techblog_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: khunect-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-techblog_db}
      DB_USERNAME: ${DB_USERNAME:-techuser}
      DB_PASSWORD: ${DB_PASSWORD:-techpassword}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-key-with-at-least-32-characters}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/login/oauth2/code/google}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      AUTH_CALLBACK_PATH: ${AUTH_CALLBACK_PATH:-/auth/callback}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-khu.ac.kr}

volumes:
  postgres-data:
