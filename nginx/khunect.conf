# ─────────────────────────────────────────────────────────────
# KHU-nect Nginx 설정
# 위치: /etc/nginx/sites-available/khunect
# 적용: sudo ln -s /etc/nginx/sites-available/khunect /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name YOUR_DOMAIN;  # 예: 34.47.66.208.nip.io

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;  # 예: 34.47.66.208.nip.io

    # Certbot이 자동으로 채워주는 인증서 경로 (도메인명에 맞게 수정)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 일반 HTTP API 요청
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket 전용 경로 (/ws-stomp, /ws 모두 처리)
    location ~ ^/(ws-stomp|ws) {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket 업그레이드 핵심 헤더
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket 연결은 오래 유지되므로 타임아웃 길게 설정
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
